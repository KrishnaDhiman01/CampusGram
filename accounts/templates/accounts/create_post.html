{% extends 'accounts/base.html' %}

{% block content %}
<div
    style="max-width: 450px; margin: 50px auto; background-color: #fff; border: 1px solid #cce0ff; border-radius: 8px; box-shadow: 0 4px 12px rgba(0,51,102,0.1); padding: 0;">

    <div
        style="border-bottom: 1px solid #cce0ff; padding: 16px; text-align: center; background-color: #003366; border-top-left-radius: 8px; border-top-right-radius: 8px;">
        <h2
            style="margin: 0; font-size: 18px; font-weight: 600; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
            Create Campus Post</h2>
    </div>

    <div style="padding: 24px;">
        <form method="POST" enctype="multipart/form-data"
            style="display: flex; flex-direction: column; gap: 20px; margin: 0;">
            {% csrf_token %}

            <div>
                <label
                    style="font-weight: 600; font-size: 14px; color: #262626; margin-bottom: 8px; display: block;">Select
                    Image</label>
                <input type="file" name="image" accept="image/*"
                    style="width: 100%; padding: 12px; border: 2px dashed #dbdbdb; border-radius: 6px; background-color: #fafafa; cursor: pointer; box-sizing: border-box; font-size: 14px;"
                    required>
            </div>

            <div>
                <label
                    style="font-weight: 600; font-size: 14px; color: #003366; margin-bottom: 8px; display: block;">Select
                    Category</label>
                <select name="category"
                    style="width: 100%; padding: 12px; border: 1px solid #cce0ff; border-radius: 6px; background-color: #fafafa; font-size: 14px; outline: none; box-sizing: border-box;">
                    <option value="Event">Event</option>
                    <option value="Achievement">Achievement</option>
                    <option value="Club Activity">Club Activity</option>
                    <option value="Announcement">Announcement</option>
                    <option value="Study Material">Study Material</option>
                    <option value="Lost & Found">Lost & Found</option>
                    <option value="Fun Moment" selected>Fun Moment</option>
                </select>
            </div>

            <div>
                <label
                    style="font-weight: 600; font-size: 14px; color: #003366; margin-bottom: 8px; display: block;">Caption</label>
                <textarea name="caption" rows="4"
                    placeholder="Share campus updates, study resources, or lost & found notices..."
                    style="width: 100%; padding: 12px; border: 1px solid #cce0ff; border-radius: 6px; background-color: #fafafa; resize: none; font-family: inherit; font-size: 14px; box-sizing: border-box; outline: none;"></textarea>
            </div>

            <button type="submit"
                style="background-color: #003366; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 5px; width: 100%; transition: background-color 0.2s;">Share
                Campus Post</button>
        </form>
    </div>

    <div
        style="border-top: 1px solid #cce0ff; padding: 16px; text-align: center; background-color: #fafafa; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;">
        <a href="{% url 'feed' %}"
            style="color: #00509e; text-decoration: none; font-size: 14px; font-weight: 600;">Cancel and return to
            Campus Feed</a>
    </div>

</div>
{% endblock %}
