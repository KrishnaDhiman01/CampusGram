<!DOCTYPE html>
<html>
<head>
    <title>CampusGram — Connect With Your College Community</title>
    {% block extra_style %}{% endblock %}
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #f0f4f8; }
        nav.base-nav { background: #003366; padding: 12px 24px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,51,102,0.15); }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.5px; color: #ffffff; }
        .nav-links a { margin-left: 18px; text-decoration: none; color: #cce0ff; font-weight: 600; transition: color 0.2s; }
        .nav-links a:hover { color: #ffffff; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        form { display: inline-block; text-align: left; border: 1px solid #cce0ff; padding: 20px; border-radius: 8px; background: white; }
        input, textarea { display: block; margin-bottom: 12px; padding: 10px; width: 100%; border: 1px solid #cce0ff; border-radius: 6px; }
        button { background: #003366; color: white; padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #00509e; }

        .error { color: #d32f2f; }
        .success { color: #2e7d32; }
    </style>
</head>
<body>

    <nav class="base-nav">
        <div class="logo">CampusGram</div>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'feed' %}">Campus Feed</a>
                <a href="{% url 'search_users' %}">Search Students</a>
                <a href="{% url 'create_post' %}">Share Post</a>
                <a href="{% url 'profile' user.username %}">Profile</a>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}">Signup</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div style="text-align: center; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; {% if message.tags == 'success' %}background: #e8f5e9; color: #2e7d32;{% else %}background: #ffebee; color: #d32f2f;{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
