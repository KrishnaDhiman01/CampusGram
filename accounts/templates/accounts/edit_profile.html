{% extends 'accounts/base.html' %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <h2>Edit Profile</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <label style="font-weight: 600;">Update Bio</label>
            <textarea name="bio" rows="4">{{ user.profile.bio }}</textarea>
            
            <label style="font-weight: 600; margin-top: 12px; display: block;">Change Profile Image</label>
            <input type="file" name="profile_img">
            
            <button type="submit">Save Changes</button>
        </form>
        <div style="margin-top: 14px;">
            <a href="{% url 'profile' user.username %}" class="button-secondary">Back to Profile</a>
        </div>
    </div>
</div>
{% endblock %}
